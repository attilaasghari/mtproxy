name: MTProto Fake TLS Proxy

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clean up previous containers
        run: |
          echo "Cleaning up old containers..."
          docker stop $(docker ps -aq) 2>/dev/null || echo "No containers to stop"
          docker rm $(docker ps -aq) 2>/dev/null || echo "No containers to remove"
          
      - name: Generate Fake TLS Secret
        id: secrets
        run: |
          echo "Generating random key..."
          RANDOM_KEY=$(head -c 16 /dev/urandom | xxd -ps)
          echo "Random key: $RANDOM_KEY"
          
          MASK_DOMAIN="1c.ru"
          echo "Mask domain: $MASK_DOMAIN"
          
          DOMAIN_HEX=$(echo -n "$MASK_DOMAIN" | xxd -ps -c 200)
          echo "Domain hex: $DOMAIN_HEX"
          
          FULL_SECRET="ee${RANDOM_KEY}${DOMAIN_HEX}"
          echo "Full secret length: ${#FULL_SECRET} characters"
          
          echo "random_key=$RANDOM_KEY" >> $GITHUB_OUTPUT
          echo "full_secret=$FULL_SECRET" >> $GITHUB_OUTPUT
          
      - name: Get Public IP
        id: ip
        run: |
          SERVER_IP=$(curl -s ifconfig.me)
          echo "Server IP: $SERVER_IP"
          echo "ip=$SERVER_IP" >> $GITHUB_OUTPUT
          
      - name: Run Proxy Container
        id: run_proxy
        run: |
          echo "Starting proxy container..."
          docker run -d \
            --name=mtproxy \
            --restart=unless-stopped \
            -p 8443:443 \
            -e SECRET=${{ steps.secrets.outputs.random_key }} \
            telegrammessenger/proxy:latest
          
          # Check if container started
          if docker ps | grep -q mtproxy; then
            echo "✅ Container started successfully"
          else
            echo "❌ Container failed to start"
            docker logs mtproxy 2>&1 || echo "No logs available"
            exit 1
          fi
          
          # Wait for proxy to initialize
          echo "Waiting 10 seconds for proxy to initialize..."
          sleep 10
          
      - name: Display Proxy Info
        run: |
          echo "=========================================="
          echo "✅ FAKE TLS PROXY IS READY"
          echo "=========================================="
          echo ""
          echo "🔗 ONE-CLICK LINK (copy this into Telegram):"
          echo "tg://proxy?server=${{ steps.ip.outputs.ip }}&port=8443&secret=${{ steps.secrets.outputs.full_secret }}"
          echo ""
          echo "📋 MANUAL ENTRY:"
          echo "Server: ${{ steps.ip.outputs.ip }}"
          echo "Port: 8443"
          echo "Secret: ${{ steps.secrets.outputs.full_secret }}"
          echo ""
          echo "=========================================="
          echo ""
          echo "Container status:"
          docker ps | grep mtproxy
          
      - name: Keep workflow alive
        run: |
          echo "Proxy is running. This will stay alive for up to 6 hours."
          echo "You can cancel manually from Actions tab when done."
          while true; do
            if ! docker ps | grep -q mtproxy; then
              echo "❌ Proxy stopped! Last logs:"
              docker logs mtproxy --tail 20
              exit 1
            fi
            sleep 60
          done
