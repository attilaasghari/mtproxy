name: Deploy telEgo Proxy

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build telEgo
        run: |
          git clone https://github.com/Scratch-net/telego.git
          cd telego
          go build -o telego

      - name: Generate Secret & Run Proxy
        run: |
          cd telego
          # Generate the secret using Google as the mask
          SECRET_OUTPUT=$(./telego generate www.google.com)
          # Extract the 32-character hex secret
          SECRET=$(echo "$SECRET_OUTPUT" | grep -oP 'secret=\K[a-f0-9]{32}')
          
          # Get the public IP of the runner
          SERVER_IP=$(curl -s ifconfig.me)

          # Create the configuration file for maximum stealth
          cat > config.toml << EOF
          [general]
          bind-to = "0.0.0.0:443"

          [secrets]
          default = "$SECRET"

          [tls-fronting]
          mask-host = "www.google.com"
          EOF

          # Run the proxy in the background
          ./telego run -c config.toml &

          # Wait for it to initialize
          sleep 5

          # Print the connection link
          echo "=========================================="
          echo "✅ telEgo Proxy Active (TLS Fronting Mode)"
          echo "=========================================="
          echo "Your proxy link:"
          echo "tg://proxy?server=$SERVER_IP&port=443&secret=ee$SECRET"
          echo ""
          echo "Manual Entry Details:"
          echo "Server: $SERVER_IP"
          echo "Port: 443"
          echo "Secret: ee$SECRET"
          echo "=========================================="

      - name: Keep Runner Alive
        run: |
          echo "Proxy is running. This host will stay alive for up to 6 hours."
          while true; do sleep 60; done
