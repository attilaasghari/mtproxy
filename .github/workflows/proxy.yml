name: MTProto Proxy with Fake TLS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup previous runs
        run: |
          docker stop $(docker ps -aq) 2>/dev/null || true
          docker rm $(docker ps -aq) 2>/dev/null || true

      - name: Get Public IP
        id: ip
        run: |
          SERVER_IP=$(curl -s ifconfig.me)
          echo "IP=${SERVER_IP}" >> $GITHUB_OUTPUT
          echo "Server IP: ${SERVER_IP}"

      - name: Run MTProto Proxy (Fake TLS Mode)
        run: |
          # 1. Generate a random 32-character hex secret for Fake TLS (must start with 'ee')
          SECRET_RAW=$(head -c 16 /dev/urandom | xxd -ps)
          SECRET="ee${SECRET_RAW}"  # 'ee' prefix enables Fake TLS obfuscation
          
          # 2. Run the official Telegram proxy with the secret
          docker run -d \
            --name=mtproxy \
            --restart=unless-stopped \
            -p 8443:443 \
            -e SECRET=${SECRET} \
            telegrammessenger/proxy:latest
          
          # 3. Wait for the proxy to initialize
          sleep 8

          # 4. Generate the connection link
          SERVER_IP="${{ steps.ip.outputs.IP }}"
          
          echo "=========================================="
          echo "✅ PROXY IS READY (Fake TLS Mode)"
          echo "=========================================="
          echo "🔗 Link for Telegram:"
          echo "tg://proxy?server=${SERVER_IP}&port=8443&secret=${SECRET}"
          echo ""
          echo "📋 Manual Entry:"
          echo "Server: ${SERVER_IP}"
          echo "Port: 8443"
          echo "Secret: ${SECRET}"
          echo "=========================================="

      - name: Keep Workflow Alive
        run: |
          echo "Proxy is running. This workflow will stay alive for up to 6 hours."
          echo "You can cancel it manually from the Actions tab when done."
          while true; do
            if ! docker ps | grep -q mtproxy; then
              echo "❌ Proxy container stopped unexpectedly!"
              exit 1
            fi
            sleep 60
          done
